<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>빙고 게임 - 빙고판 보기</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* board.html only: make mission list + board more compact (about half size) */
    .board-page .column-layout{ gap: 12px !important; }

    /* Top-left Home button */
    .board-page .home-link{
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10001;
      text-decoration: none;
    }
    .board-page .home-link.btn{
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 1000;
    }
    @media (max-width: 640px){
      .board-page .home-link{ top: 10px; left: 10px; }
      .board-page .home-link.btn{ padding: 9px 10px; border-radius: 12px; }
    }

    .board-page #teamSelect{
      font-size: 15px;
      min-width: 180px;
    }

    /* 타이틀: 제목은 정확히 가운데, POA2는 오른쪽에 작게(제목 가운데에 영향 X) */
    .board-page .hero-title{ width:100%; text-align:center; }
    .board-page .hero-title .title-stack{ display:inline-block; position: relative; }

    .board-page .title-inline{ margin:0; text-align:center; }

    .board-page .kicker-plain{
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 14px;
      display: inline-block;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.6px;
      color: rgba(15,23,42,0.55);
      white-space: nowrap;
    }

    /* 상단 pill(상태/업데이트/경과/종료) 라운딩/여백을 카드 느낌으로 통일 */
    .board-page .pill{
      border-radius: 22px; /* 곡률(R) 통일 */
      padding: 10px 14px;  /* 카드 느낌과 통일 */
    }

    /* 모바일에서 hero 좌우 패딩을 아래 카드와 맞춤 */
    @media (max-width: 640px){
      .board-page .hero{
        padding: 10px 18px 10px; /* 전체 헤더를 위로 당김 */
      }
      .board-page .hero-row{ gap: 10px; align-items: flex-start; }
      /* 조 선택 드롭다운 폰트 크게 */
      .board-page #teamSelect{
        font-size: 16px;
        padding: 14px 16px;
      }

      .board-page #teamSelect option{
        font-size: 16px;
      }
      .board-page .kicker-plain{ margin-left: 10px; font-size: 11px; }
    }

    .board-page .board{
      gap: 6px;
      aspect-ratio: 1 / 1;        /* 전체 보드를 정사각형으로 */
      width: 100%;
      max-width: 420px;           /* 너무 커지지 않도록 제한 */
      margin: 0 auto;             /* 가운데 정렬 */
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    /* 빙고판 셀만 정사각형 */
    .board-page #board .cell{
      aspect-ratio: 1 / 1;
      min-height: 0;
      padding: 4px;
      border-radius: 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .board-page .sub{ font-size: 10px; line-height: 1.2; opacity: 0.85; }
    /* 제목 가운데 정렬 */
    .board-page .section-title{
      text-align: center;
    }

    /* 히든 미션 보라색(강조) 비활성화: board 페이지에서는 일반 미션처럼 보이게 */
    .board-page .hidden-mission{ color: inherit !important; }
    .board-page .cell.hidden-mission{
      background: rgba(255,255,255,0.78) !important;
      border-color: rgba(255,255,255,0.60) !important;
      box-shadow: 0 10px 25px rgba(2,8,23,0.06) !important;
    }

    /* 미션 리스트는 스크롤 없이 전체 노출 */
    .board-page #missionList{
      max-height: none;
      overflow: visible;
      padding-right: 0;
    }

    /* Mission buttons (open modal) */
    .board-page #missionList{
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .board-page .mission-btn{
      width: 100%;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: 1000;
      letter-spacing: -0.01em;
      text-align: center;
      cursor: pointer;
      user-select: none;
      border: 1px solid rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 10px 25px rgba(2,8,23,0.06);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .board-page .mission-btn:hover{
      box-shadow: 0 14px 32px rgba(2,8,23,0.10);
      border-color: rgba(37,99,235,0.35);
      transform: translateY(-1px);
    }

    .board-page .mission-btn:active{ transform: translateY(1px); }

    .board-page .mission-btn.checked{
      border-color: rgba(37,99,235,0.35);
      background: rgba(37,99,235,0.10);
    }

    .board-page .mission-btn .num{ opacity: 0.85; }
    .board-page .mission-btn .done{ margin-left: 6px; font-weight: 1100; }

    /* Modal */
    .board-page .modal{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;

      /* ✅ 가독성 확보: 너무 어둡지 않은 딤 + 살짝 블러 */
      background: rgba(2,8,23,0.14);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .board-page .modal.open{ display: flex; align-items: center; justify-content: center; }

    .board-page .modal-card{
      width: min(560px, calc(100vw - 36px));
      max-height: calc(100vh - 72px);   /* ✅ 화면 안에 항상 들어오게 */
      display: flex;                    /* ✅ body 스크롤을 위해 column */
      flex-direction: column;
      border-radius: 18px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .board-page .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(2,8,23,0.04);
      border-bottom: 1px solid rgba(2,8,23,0.08);
    }

    .board-page .modal-title{
      margin: 0;
      font-size: 16px;
      font-weight: 1100;
      letter-spacing: -0.01em;
      color: rgba(15,23,42,0.92);
    }

    .board-page .modal-close{
      border: 0;
      background: rgba(2,8,23,0.06);
      border: 1px solid rgba(2,8,23,0.12);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 1000;
      cursor: pointer;
    }

    .board-page .modal-body{
      padding: 14px 16px 16px;
      overflow: auto;                  /* ✅ 내용 길면 여기서 스크롤 */
    }

    .board-page .modal-text{
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: rgba(15,23,42,0.92);
      word-break: keep-all;
    }

    .board-page .modal-actions{
      display:flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(2,8,23,0.08);
      background: rgba(255,255,255,0.94);
      flex: 0 0 auto;                  /* ✅ 항상 아래에 보이게 */
    }

    @media (max-width: 640px){
      .board-page #missionList{ grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .board-page .mission-btn{ font-size: 13px; padding: 12px 8px; }
      .board-page .modal-text{ font-size: 14px; }
    }
  </style>
</head>
<body class="no-x board-page">

  <a class="btn ghost home-link" href="/" aria-label="홈으로 돌아가기">← 홈</a>

  <div class="hero">
    <div class="hero-row">
      <div class="hero-title">
        <div class="title-stack title-locked">
          <h1 class="title-inline">Acuvue Bin&quot;Go&quot;</h1>
          <span class="kicker-plain">POA2</span>
        </div>
      </div>

      <div class="hero-actions">
        <div class="meta-rows">
          <div class="meta-row">
            <span class="pill">상태: <strong id="status">-</strong></span>
            <span class="pill">업데이트: <strong id="updatedAt">-</strong></span>
          </div>
          <div class="meta-row">
            <span class="pill">경과: <strong id="elapsed">00:00:00</strong></span>
            <span class="pill">종료시각: <strong id="endedAt">-</strong></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- 1단계: 조 선택 -->
    <div class="card" id="teamSelectCard">
      <h2 class="section-title">조 선택</h2>
      <div class="row" style="gap:12px; flex-wrap:wrap;">
        <select id="teamSelect">
          <option value="">조를 선택하세요</option>
        </select>
        <button class="btn primary" onclick="enterTeam()">확인</button>
      </div>
    </div>

    <!-- 2단계: 선택된 조 화면 -->
    <div id="teamView" style="display:none;">

      <div class="card" style="margin-bottom:16px;">
        <div class="card-head">
          <div class="title">
            <h2 id="teamTitle" style="margin:0;"></h2>
            <span class="small" id="teamSummary"></span>
          </div>
          <button class="btn ghost" onclick="backToSelect()">조 다시 선택</button>
        </div>
      </div>

      <div class="column-layout" style="display:flex; flex-direction:column; gap:16px;">

        <!-- 미션 리스트 (위) -->
        <div class="card">
          <h2 class="section-title">미션 리스트</h2>
          <div id="missionList"></div>
        </div>

        <!-- 빙고판 (아래) -->
        <div class="card">
          <h2 class="section-title">빙고판</h2>
          <div class="board" id="board"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- Mission modal -->
  <div class="modal" id="missionModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="missionModalTitle">
      <div class="modal-head">
        <h3 class="modal-title" id="missionModalTitle">미션</h3>
        <button class="modal-close" type="button" onclick="closeMissionModal()">닫기</button>
      </div>
      <div class="modal-body">
        <p class="modal-text" id="missionModalTitleText">-</p>
        <div class="modal-desc" id="missionModalDesc">(설명)</div>
        <div class="modal-media" id="missionModalMedia" style="display:none;">
          <img id="missionModalImg" alt="미션 예시 이미지" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn primary" type="button" onclick="closeMissionModal()">확인</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const ITEM_NAME_KO = {
      SHUFFLE_ATTACK: "빙고판 셔플",
      INSTANT_CLEAR: "원하는 칸 즉시 완료"
    };
    let LAST_STATE = null;
    let SELECTED_TEAM = null;
    let __timerInterval = null;


    function fmt(ms){
      const s = Math.floor(ms/1000);
      const hh = String(Math.floor(s/3600)).padStart(2,"0");
      const mm = String(Math.floor((s%3600)/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${hh}:${mm}:${ss}`;
    }

    function computeElapsed(timer){
      if(!timer) return 0;
      let ms = Number(timer.elapsedMs || 0);
      if(timer.running && timer.startedAt){
        const started = Date.parse(timer.startedAt);
        if(!Number.isNaN(started)){
          ms += Math.max(0, Date.now() - started);
        }
      }
      return ms;
    }

    function startTicker(){
      if(__timerInterval) return;
      __timerInterval = setInterval(()=>{
        if(!LAST_STATE?.game?.timer) return;
        const t = LAST_STATE.game.timer;
        document.getElementById("elapsed").textContent = fmt(computeElapsed(t));
      }, 1000);
    }

    function render(state){
      LAST_STATE = state;

      document.getElementById("status").textContent = state.game.status || "-";
      document.getElementById("updatedAt").textContent = new Date().toLocaleTimeString([], {
        hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false
      });

      const t = state.game.timer || {};
      document.getElementById("elapsed").textContent = fmt(computeElapsed(t));
      document.getElementById("endedAt").textContent = t.endedAt
        ? new Date(t.endedAt).toLocaleTimeString([], {
            hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false
          })
        : "-";

      startTicker();

      // 조 셀렉트 옵션 채우기
      const select = document.getElementById("teamSelect");
      if(select.options.length <= 1){
        Object.keys(state.teams || {}).forEach(team=>{
          const opt = document.createElement("option");
          opt.value = team;
          opt.textContent = team + "조";
          select.appendChild(opt);
        });
      }

      if(SELECTED_TEAM){
        renderTeamView();
      }
    }

    function enterTeam(){
      const val = document.getElementById("teamSelect").value;
      if(!val) return;
      SELECTED_TEAM = val;
      document.getElementById("teamSelectCard").style.display = "none";
      document.getElementById("teamView").style.display = "block";
      renderTeamView();
    }

    function backToSelect(){
      SELECTED_TEAM = null;
      document.getElementById("teamSelectCard").style.display = "block";
      document.getElementById("teamView").style.display = "none";
    }

    function renderTeamView(){
      const teamData = LAST_STATE?.teams?.[SELECTED_TEAM];
      if(!teamData) return;

      document.getElementById("teamTitle").textContent = SELECTED_TEAM + "조";
      document.getElementById("teamSummary").textContent =
        `빙고 ${teamData.bingoCount} / 완료 ${teamData.clearedCount}`;

      // 9번(히든) 미션은 조마다 "이미지 단서"만 다르게 보여주도록 구성
      // ✅ 수정 포인트:
      // - 공통 title/desc는 hiddenMissionCommon에서 수정
      // - 조별 단서 이미지는 hiddenClueImgByTeam에서 경로만 바꾸면 됩니다 (public 기준 URL: "/images/xxx.png")
      const hiddenMissionCommon = {
        title: "(히든 미션!!) 단서로 장소 추리하기!",
        desc: "아래 단서를 보고 어떤 장소인지 추리해 해당 장소에서 인증샷을 찍어 제출해 주세요! 🔍\n\n단, 5개의 단서 중 2개는 슬쩍 끼워 넣은(?) 거짓 단서입니다 😏 조원들의 집단지성을 발휘해 진실을 가려내 보세요!\n\n해당 미션 클리어 시 빙고게임에 유리한 아이템이 지급됩니다!",
        img: "" // 아래에서 팀별로 덮어씁니다
      };

      const hiddenClueImgByTeam = {
        "1": "/경기전_14.jpeg",
        "2": "/전동성당_35.jpeg",
        "3": "/전주향교_25.jpeg",
        "4": "/풍남문_12.jpeg",
        "5": "/경기전_14.jpeg",
        "6": "/전동성당_35.jpeg",
        "7": "/전주향교_25.jpeg",
        "8": "/풍남문_12.jpeg",
        "9": "/경기전_14.jpeg"
      };

      const hiddenImg = hiddenClueImgByTeam[String(SELECTED_TEAM)] || "";
      const hiddenMission = { ...hiddenMissionCommon, img: hiddenImg };

    const missions = [
      {
        title: "회사 전체 단체 사진 찍기 - 한옥마을입구",
        desc: "본 미션은 예시 미션입니다!\n나머지 빙고 미션도 같은 방법으로 클리어 해주세요 ✨\n가장 빠르게 3빙고를 만든 TOP3 조에게는 상품이 주어집니다!\n그럼, Let’s ACUBingo!😆",
        img: "" // 여기에 예시 이미지 URL 넣기 (예: /images/m1.jpg 또는 https://...)
      },
      {
        title: "전주 한옥마을 배경으로 배경으로 아큐브 홍보 포스터 만들기!",
        desc: "생성형 AI를 적극 활용하여 ‘한옥 배경 + 아큐브’ 컨셉의 포스터 이미지를 만들고 결과물을 제출해 주세요.\n해당 포스터는 2일차 POA2에서 공유 될 예정입니다!",
        img: ""
      },
      {
        title: "확대한 이미지에 있는 장소 알아내기!",
        desc: "아래 이미지를 보고 어떤 장소인지 알아내고 해당 장소에서 셀카 인증샷을 찍어 제출해 주세요! \n(힌트: 😋 )",
        img: "/미션3장소.png"
      },
      {
        title: "빨강(존존 컬러) + 파랑(아큐브 컬러)이 함께 들어간 것을 찾아주세요!",
        desc: "주변 사물/간판/소품 중 빨강+파랑이 동시에 들어간 대상을 찾아 사진으로 제출해 주세요.\n(힌트: 벽화마을을 산책해보세요🤫)",
        img: "/미션4사진.jpeg"
      },
      {
        title: "오목대 앞에서 인간 제로 게임!",
        desc: "무릎이 튼튼한? 5명 선발 후 MC가 말한 숫자 맞추면 통과!\n(오목대 앞에서 기다리는 OC팀 멤버를 찾아주세요👀)",
        img: ""
      },
      {
        title: "오목대 앞에서 초성 퀴즈 ㅇㅁㄷ ㅇㅇㅅ ㅊㅅ ㅋㅈ",
        desc: "오목대 앞에서 주제(랜덤)를 선택해서 초성 퀴즈를 맞춰주세요!\n(오목대 앞에서 기다리는 OC팀 멤버를 찾아주세요👀)",
        img: ""
      },
      {
        title: "숨은 복(福) 막새기와 찾기!",
        desc: "한옥 기와 끝에 있는 복(福)자 막새기와를 찾아서 인증샷을 찍어 제출해 주세요!\n(힌트: 메인길보다 공방 골목 쪽을 잘살펴보세요🤫)",
        img: ""
      },
      {
        title: "한옥마을 내 간판으로 아큐브, 아큐브 직원 등등 관련된 단어 만들기!(글자 돌리기 허용)",
        desc: "한옥마을 간판/문양에서 글자를 찾아 조합해 ‘아큐브와 연결되는 단어’를 만들고 증거 사진을 제출해 주세요.\n꼭 단어가 맞지 않아도 좋아요! 말이 되게 끔만 만들어주세요!\n(예시이미지: 윤해솔)",
        img: "/미션8사진.jpeg"
      },
      hiddenMission
    ];

      const list = document.getElementById("missionList");
      list.innerHTML = "";

      const doneMap = teamData.missionDone || {};

      missions.forEach((text, idx)=>{
        const i = idx + 1;
        // server mission ids: M1~M8, hidden is H{team}
        const missionId = (i === 9) ? `H${SELECTED_TEAM}` : `M${i}`;
        const done = !!doneMap[missionId];

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mission-btn" + (done ? " checked" : "");
        btn.innerHTML = `<span class="num">미션 ${i}</span>${done ? `<span class="done">✓</span>` : ``}`;
        btn.addEventListener("click", ()=> openMissionModal(i, missions[idx], done));
        list.appendChild(btn);
      });

      // 빙고판
      const board = document.getElementById("board");
      board.innerHTML = "";

      const revealedArr = teamData.revealed || [];

      for(let i=0;i<9;i++){
        const cleared = (teamData.cleared || [])[i];
        const disabled = (teamData.disabled || [])[i];
        const award = (teamData.awards || [])[i];

        // server reveals mission id only for cleared/disabled cells: M1~M8, H{team}
        const revealed = revealedArr[i];
        let missionLabel = "";
        if(revealed){
          if(/^M\d+$/.test(revealed)) missionLabel = `미션 ${revealed.slice(1)}`;
          else if(/^H\d+$/.test(revealed)) missionLabel = "히든";
        }

        const cell = document.createElement("div");
        cell.className = "cell " + (cleared?"cleared":"") + (disabled?" disabled":"");

        if(disabled){
          cell.innerHTML = `
            <div>⛔</div>
            <div class="sub">${missionLabel ? `(${missionLabel}) ` : ""}(무력화)</div>
          `;
        } else if(cleared && award){
          const itemName = ITEM_NAME_KO[award] || award;
          cell.innerHTML = `
            <div>🎁</div>
            <div class="sub">${missionLabel ? `(${missionLabel}) ` : ""}(${itemName})</div>
          `;
        } else if(cleared){
          cell.innerHTML = `
            <div>❌</div>
            <div class="sub">${missionLabel ? `(${missionLabel})` : ""}</div>
          `;
        } else {
          cell.innerHTML = ``;
        }

        board.appendChild(cell);
      }
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>\"']/g, (m)=>({
        "&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;","'":"&#39;"
      }[m]));
    }

    function openMissionModal(no, mission, done){
      const titleEl = document.getElementById("missionModalTitle");
      const titleTextEl = document.getElementById("missionModalTitleText");
      const descEl = document.getElementById("missionModalDesc");
      const mediaWrap = document.getElementById("missionModalMedia");
      const imgEl = document.getElementById("missionModalImg");

      // 상단 타이틀(완료/미완료)
      titleEl.textContent = done ? `미션 ${no} (완료)` : `미션 ${no} (미완료)`;

      // 미션명
      titleTextEl.textContent = mission?.title || "-";

      // 설명
      descEl.textContent = mission?.desc || "";

      // 예시 이미지(선택)
      const src = (mission?.img || "").trim();
      if(src){
        imgEl.src = src;
        mediaWrap.style.display = "block";
      } else {
        imgEl.removeAttribute("src");
        mediaWrap.style.display = "none";
      }

      const modal = document.getElementById("missionModal");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");

      // close when clicking backdrop
      modal.addEventListener("click", __modalBackdropCloseOnce);
      // close on ESC
      document.addEventListener("keydown", __modalEscCloseOnce);
    }

    function __modalBackdropCloseOnce(e){
      if(e.target && e.target.id === "missionModal") closeMissionModal();
    }

    function __modalEscCloseOnce(e){
      if(e.key === "Escape") closeMissionModal();
    }

    function closeMissionModal(){
      const modal = document.getElementById("missionModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modal.removeEventListener("click", __modalBackdropCloseOnce);
      document.removeEventListener("keydown", __modalEscCloseOnce);
    }

    socket.on("state", render);
  </script>
</body>
</html>
